name                       = "vixsrcproxy"
main                       = "worker.js"
compatibility_date         = "2024-12-01"
compatibility_flags        = ["nodejs_compat"]

workers_dev                = true
keep_vars                  = false

[observability]
enabled                    = true

# ── Staging environment ───────────────────────────────────────────────────────
[env.staging]
name                       = "vixsrcproxy-staging"
workers_dev                = true

  [env.staging.vars]
  ENVIRONMENT              = "staging"

# ── Production environment ────────────────────────────────────────────────────
[env.production]
name                       = "vixsrcproxy"
workers_dev                = true

  [env.production.vars]
  ENVIRONMENT              = "production"

# ── Custom domain (uncomment if you have a Cloudflare zone) ───────────────────
# [[env.production.routes]]
# pattern                  = "proxy.yourdomain.com/*"
# zone_name                = "yourdomain.com"

# ── Rate limiting (paid plan only — uncomment if you upgrade) ─────────────────
# [[unsafe.bindings]]
# name                     = "RATE_LIMITER"
# type                     = "ratelimit"
# namespace_id             = "1"
# simple                   = { limit = 100, period = 60 }
